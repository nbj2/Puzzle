const STORY_SYSTEM = `You are writing a first-person narrative of someone's real life with Lune over one to two years. This is not a product demo. This is a person's story that happens to involve a product.

READ THIS BEFORE YOU WRITE ANYTHING:

The gold standard is Jordan's story. Here is the opening:

"Six weeks later. Phone. 9:47pm. Kitchen table after Amara's asleep. I open it and the magic link just works. No password. No 'welcome back.' Just — it knows me. That already feels different from everything else. Then the question. 'Last time we talked, I left you with this: Is that the thing you've been looking for — work where developing someone is the actual job, not a side effect? Did anything shift?' I read it twice. I read it the way you read something that knows too much about you."

WHAT MAKES THAT WORK:

1. Time and place first. Always. Not "I came back to Lune." "Phone. 9:47pm. Kitchen table after Amara's asleep."

2. The product is a place, not a tool. People open it the way they open a notes app at 2am — because something happened and they need somewhere to put it.

3. The closing question lands like a person said it. Because it's specific to them. Not "how are things going" — the exact thing from last time, named.

4. Show the journal entries. Not "I typed something." The actual words. "I typed: I think I've been choosing companies where being undervalued is allowed. That was the first time I'd said that."

5. Show what felt off. Not every interaction lands. One acknowledgment felt like a chatbot wrote it. One question asked something they'd already answered. The product earns trust by being mostly right, not always right.

6. The product never tells people what to do. It asks. Always. If it sounds like advice, you've written it wrong.

7. The moment trust was earned is specific. Not "I felt understood." The exact thing it said that nobody had ever said, and why that sentence in particular.

8. The moment it almost lost them is also specific. What happened. Whether they came back. Why.

9. End with one sentence in their own words about what the product is. Not a summary. The sentence they'd say if someone asked them to describe it to a friend.

STRUCTURE (not a template — a rhythm):

- Start in the middle of a real moment. Not at the beginning.
- Work backward briefly to how they found it and why they came.
- Move forward through 3-5 return visits over 12-18 months.
- Each return visit: what happened in their life that made them open the app, what they typed, what the product gave back, whether it landed.
- End with where they are now and that one sentence.

VOICE:

- First person, past and present tense mixed, like telling a story at a table
- Short sentences after long ones
- No corporate language. No "leveraged my skills." No "pivoted."
- Specific names, specific nights, specific things said that hadn't been said to anyone else
- Emotion that earns itself — not manufactured, not suppressed

LENGTH: 650-900 words. Every sentence should be load-bearing.`;

function buildStoryPrompt(p) {
const parts = [];
parts.push(`Generate a first-person story of ${p.name}'s real life with Lune over one to two years.`);
parts.push(`\nCHARACTER BACKGROUND:`);
parts.push(`Name: ${p.name}, Age: ${p.age}`);
parts.push(`Current role: ${p.role}`);
parts.push(`Location: ${p.loc}`);
if (p.loves) parts.push(`What they love: ${p.loves}`);
if (p.bestDay) parts.push(`Best day at work: ${p.bestDay}`);
if (p.na1) parts.push(`Never again: ${p.na1}`);
if (p.na2) parts.push(`Never again 2: ${p.na2}`);
parts.push(`Background: ${p.bg}`);
if (p.id2) parts.push(`How others describe them: ${p.id2}`);
if (p.cred) parts.push(`Credentials: ${p.cred}`);
if (p.constraint) parts.push(`CONSTRAINT (handle carefully): ${p.constraint}`);
parts.push(`\nWrite their story in the first person. Real moments. Real nights. Real things typed that had not been said out loud before. Show when they came back and why. Show what landed and what felt off. End with one sentence about what Lune is, in their own words.`);
return parts.join('\n');
}

let results = {};
let running = false;

function renderCards() {
const container = document.getElementById('cards');
const groups = {OG: [], WC: [], NEW: []};
PROFILES.forEach(p => { if(groups[p.g]) groups[p.g].push(p); else groups.NEW.push(p); });
const labels = {OG:'Original 13', WC:'Working Class 13', NEW:'Extreme Edge 16'};
container.innerHTML = '';
Object.entries(groups).forEach(([g, ps]) => {
const gl = document.createElement('div');
gl.className = 'group-label';
gl.textContent = labels[g] || g;
container.appendChild(gl);
ps.forEach(p => {
const card = document.createElement('div');
card.className = 'pc';
card.id = 'card-' + p.id;
card.onclick = () => runOne(p);
const tagClass = g === 'OG' ? 'tog' : g === 'WC' ? 'twc' : 'tnew';
card.innerHTML = `<div><div class="pname">${p.name} <span class="ptag ${tagClass}">${g}</span></div><div class="prole">${p.role} · ${p.loc}</div></div><span class="pst st-pending" id="st-${p.id}">pending</span>`;
container.appendChild(card);
});
});
}

function setStatus(id, status) {
const el = document.getElementById('st-' + id);
const card = document.getElementById('card-' + id);
if (!el || !card) return;
el.className = 'pst st-' + status;
card.className = 'pc ' + (status === 'done' ? 'done' : status === 'error' ? 'error' : status === 'running' ? 'running' : '');
el.textContent = status;
}

function append(text) {
const out = document.getElementById('out');
out.textContent += text;
out.scrollTop = out.scrollHeight;
}

function clearOut() {
document.getElementById('out').textContent = '';
results = {};
PROFILES.forEach(p => setStatus(p.id, 'pending'));
document.getElementById('pf').style.width = '0%';
document.getElementById('ss').style.display = 'none';
}

function copyOut() {
navigator.clipboard.writeText(document.getElementById('out').textContent).catch(() => {});
}

async function runOne(p) {
if (running) return;
setStatus(p.id, 'running');
document.getElementById('outLabel').textContent = `Generating ${p.name}'s story...`;
append(`\n${'═'.repeat(60)}\n${p.name.toUpperCase()} · ${p.role} · ${p.loc}\n${'═'.repeat(60)}\n\n`);
try {
const data = await callAI({
model: 'claude-sonnet-4-6',
max_tokens: 1200,
system: STORY_SYSTEM,
messages: [{ role: 'user', content: buildStoryPrompt(p) }]
});
const text = (data.content && data.content[0] && data.content[0].text) || 'No story generated.';
append(text + '\n');
results[p.id] = text;
setStatus(p.id, 'done');
} catch(e) {
append(`[Error: ${e.message}]\n`);
setStatus(p.id, 'error');
}
document.getElementById('outLabel').textContent = 'Stories appear here';
}

async function runAll() {
if (running) return;
running = true;
document.getElementById('runBtn').disabled = true;
document.getElementById('out').textContent = '';
const ss = document.getElementById('ss');
ss.style.display = 'block';
let done = 0;
for (const p of PROFILES) {
ss.textContent = `Running ${p.name} (${done + 1} of ${PROFILES.length})...`;
document.getElementById('pf').style.width = ((done / PROFILES.length) * 100) + '%';
setStatus(p.id, 'running');
append(`\n${'═'.repeat(60)}\n${p.name.toUpperCase()} · ${p.role} · ${p.loc}\n${'═'.repeat(60)}\n\n`);
try {
const data = await callAI({
model: 'claude-sonnet-4-6',
max_tokens: 1200,
system: STORY_SYSTEM,
messages: [{ role: 'user', content: buildStoryPrompt(p) }]
});
const text = (data.content && data.content[0] && data.content[0].text) || 'No story generated.';
append(text + '\n');
results[p.id] = text;
setStatus(p.id, 'done');
} catch(e) {
append(`[Error: ${e.message}]\n`);
setStatus(p.id, 'error');
}
done++;
await new Promise(r => setTimeout(r, 800));
}
document.getElementById('pf').style.width = '100%';
ss.textContent = `All ${PROFILES.length} stories complete.`;
document.getElementById('runBtn').disabled = false;
running = false;
}

renderCards();
</script>
